name: ci
# CI du plugin : smoke test du générateur (layouts + invariants + hooks + npm).
# Matrice ubuntu + macos : les hooks ont des branches BSD (date -j/-v) que seul
# macOS exerce — la plateforme principale de l'auteur.
on:
  push:
    branches: [main]
  pull_request:
jobs:
  smoke:
    name: Smoke test du générateur (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Smoke test (4 layouts)
        run: ./scripts/smoke-test.sh

  shellcheck:
    # 98 % du code de ce dépôt est du Bash : bash -n n'en vérifie que la syntaxe.
    # Analyse statique, donc ubuntu seul suffit (shellcheck y est préinstallé).
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Shellcheck (severity=style)
        run: |
          # Version tracée : le runner la fournit, et une version plus ancienne
          # que celle du poste local peut signaler davantage (ex. SC2015).
          shellcheck --version
          shellcheck -x \
            scripts/bootstrap.sh scripts/smoke-test.sh scripts/benchmark-routing.sh \
            templates/hooks/*.sh templates/scripts/*.sh

  typecheck:
    # Le smoke test génère les projets mais ne les compile pas : c'est ce trou qui
    # a laissé passer un tsconfig Next dont l'include aspirait cypress.config.ts,
    # rendant les tests unitaires non compilables. Ici on installe et on compile
    # pour de vrai — le seul contrôle qui prouve qu'un projet généré tient debout.
    name: Typecheck des projets générés (${{ matrix.case.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case:
          - { name: front-back, flags: "--layout front-back", dirs: "front back" }
          - { name: single-nextjs, flags: "--layout single --framework nextjs", dirs: "." }
          - { name: single-vite, flags: "--layout single --framework vite", dirs: "." }
          - { name: package, flags: "--layout package --no-storybook", dirs: "." }
    steps:
      - uses: actions/checkout@v7
      # Générer avant setup-node : bootstrap.sh n'a besoin que de bash, et le
      # .nvmrc qu'il produit porte NODE_VERSION, la source de vérité du dépôt.
      - name: Générer le projet
        run: ./scripts/bootstrap.sh --name proj-tc --owner CI --target tc ${{ matrix.case.flags }} --no-git
      - uses: actions/setup-node@v6
        with:
          node-version-file: tc/.nvmrc
      - name: Installer et compiler
        working-directory: tc
        run: |
          set -euo pipefail
          for d in ${{ matrix.case.dirs }}; do
            echo "::group::$d"
            (cd "$d" && npm install --no-audit --no-fund && npx tsc --noEmit)
            echo "::endgroup::"
          done

  version-bump:
    # CLAUDE.md impose de bumper plugin.json dans la même PR : sans bump, le
    # workflow release ne crée aucun tag et la release est perdue en silence.
    name: Bump de version
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Vérifier le bump de .claude-plugin/plugin.json
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          base=$(git show "origin/$BASE_REF:.claude-plugin/plugin.json" | jq -r .version)
          head=$(jq -r .version .claude-plugin/plugin.json)
          if [ "$base" = "$head" ]; then
            echo "::error::Version inchangée ($head). CLAUDE.md impose un bump SemVer dans la même PR, sinon aucune release ne sera publiée."
            exit 1
          fi
          higher=$(printf '%s\n%s\n' "$base" "$head" | sort -V | tail -n1)
          if [ "$higher" != "$head" ]; then
            echo "::error::Version $head n'est pas supérieure à $base."
            exit 1
          fi
          echo "Version $base → $head"
