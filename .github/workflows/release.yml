name: release
# À chaque push sur main : lit la version dans .claude-plugin/plugin.json et,
# si le tag vX.Y.Z n'existe pas encore, crée le tag + la GitHub Release.
# La version DOIT être bumpée en semantic versioning avant tout merge sur main
# (voir CLAUDE.md).
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Créer le tag et la release si nécessaire
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version .claude-plugin/plugin.json)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version invalide dans plugin.json : $VERSION" >&2
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Le tag $TAG existe déjà — rien à faire."
            exit 0
          fi
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            NOTES=$(git log --pretty='- %s' "$PREV"..HEAD)
          else
            NOTES=$(git log --pretty='- %s' HEAD)
          fi
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" --target "$GITHUB_SHA"
          echo "Release $TAG créée."
