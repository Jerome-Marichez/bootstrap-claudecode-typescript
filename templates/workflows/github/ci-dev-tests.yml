name: ci-dev-tests
# Checks rapides (PR -> dev) : tests unitaires + intégration.
on:
  pull_request:
    branches: [dev]
jobs:
  tests:
    name: Tests unitaires + intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Installation
        run: make install
      - name: Tests unitaires
        run: make test-unit
      - name: Tests d'intégration
        run: make test-int
