name: ci-dev-tests
# Checks rapides (PR -> dev) : tests unitaires + intégration.
on:
  pull_request:
    branches: [dev]
jobs:
  tests:
    name: Tests unitaires + intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Installation
        run: make install
      - name: Tests unitaires
        run: make test-unit
      - name: Tests d'intégration
        run: make test-int
